services:
  - type: web
    name: office-product-management-api
    runtime: java
    rootDir: server
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/office-product-management-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: office_product_management
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_SEED_NAME
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
